---
- hosts: localhost
  connection: local

  vars:
    type: t3.micro
    region: us-east-1
    group: default
    public_ip: true
    key_name: mykeypair
    subnet_id: subnet-08164473fa277ebed

  tasks:

  - name: Create ec2 instances
    amazon.aws.ec2_instance:
      name: "{{ item.name }}"
      key_name: "{{ key_name }}"
      instance_type: "{{ type }}"
      security_group: "{{ group }}"
      region: "{{ region }}"
      aws_access_key: "{{ ec2_access_key }}"
      aws_secret_key: "{{ ec2_secret_key }}"

      vpc_subnet_id: "{{ subnet_id }}"

      network_interfaces:
        - assign_public_ip: "{{ public_ip }}"

      image_id: "{{ item.image }}"

    loop:
       - {image: "ami-0c02fb55956c7d316", name: "manage-node-1"}
       - {image: "ami-0c02fb55956c7d316", name: "manage-node-2"}
       - {image: "ami-0c02fb55956c7d316", name: "manage-node-3"}
       - {image: "ami-0c02fb55956c7d316", name: "manage-node-4"}